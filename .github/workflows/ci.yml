name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy .
      - name: Test
        run: uv run pytest

  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @aim/web lint
      - name: Type check
        run: pnpm --filter @aim/web typecheck
      - name: Test
        run: pnpm --filter @aim/web test
      - name: Build
        run: pnpm --filter @aim/web build

  migrations:
    name: Database migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: aim
          POSTGRES_USER: aim
          POSTGRES_PASSWORD: aim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aim -d aim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://aim:aim@localhost:5432/aim
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Upgrade to head
        run: uv run alembic -c migrations/alembic.ini upgrade head
      - name: Downgrade to base
        run: uv run alembic -c migrations/alembic.ini downgrade base
      - name: Re-upgrade to head
        run: uv run alembic -c migrations/alembic.ini upgrade head
