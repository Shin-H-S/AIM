<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- AIM 브랜드 심볼 "펄스 타겟": 과녁(조준) 위를 지나는 서비스의 심박 -->
  <style>
    .ring { stroke: #0891b2; }
    .ink { stroke: #0f172a; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #22d3ee; }
      .ink { stroke: #e2f8fd; }
    }
  </style>
  <circle class="ring" cx="24" cy="24" r="16" stroke-width="3.5"/>
  <g class="ink" stroke-linecap="round" stroke-width="3.5">
    <line x1="24" x2="24" y1="2.5" y2="8"/>
    <line x1="24" x2="24" y1="40" y2="45.5"/>
    <line x1="2.5" x2="8" y1="24" y2="24"/>
    <line x1="40" x2="45.5" y1="24" y2="24"/>
  </g>
  <clipPath id="lens"><circle cx="24" cy="24" r="14"/></clipPath>
  <g clip-path="url(#lens)">
    <polyline class="ink" points="8,24 17,24 21,14 27,33 31,24 40,24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
