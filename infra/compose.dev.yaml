name: aim-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aim
      POSTGRES_USER: aim
      POSTGRES_PASSWORD: aim
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aim -d aim"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
