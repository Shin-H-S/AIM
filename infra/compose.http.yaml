# HTTP-only overlay for temporary domainless operation on a plain IP.
#
# Usage:
#   docker compose --env-file .env.production \
#     -f infra/compose.yaml -f infra/compose.http.yaml up -d
#
# Required .env.production values in this mode:
#   AIM_WEB_HOSTNAME=:80
#   AIM_API_HOSTNAME=:8080
#   NEXT_PUBLIC_API_URL=http://<VM_EXTERNAL_IP>:8080
#   CORS_ALLOWED_ORIGINS=["http://<VM_EXTERNAL_IP>"]
#
# Remove this overlay (and restore hostname-based values) once real DNS
# records exist; the base compose file then serves HTTPS via Caddy.
services:
  caddy:
    ports:
      - "8080:8080"
