name: aim

x-aim-logging: &aim-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-aim-env: &aim-env
  APP_ENV: ${APP_ENV:-production}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  API_HOST: ${API_HOST:-0.0.0.0}
  API_PORT: ${API_PORT:-8000}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
  DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
  REDIS_URL: ${REDIS_URL:?set REDIS_URL}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  SCANNER_TIMEOUT_SECONDS: ${SCANNER_TIMEOUT_SECONDS:-10}
  SCANNER_MAX_REDIRECTS: ${SCANNER_MAX_REDIRECTS:-5}
  SCANNER_MAX_RESPONSE_BYTES: ${SCANNER_MAX_RESPONSE_BYTES:-1048576}
  SSL_INSPECTION_TIMEOUT_SECONDS: ${SSL_INSPECTION_TIMEOUT_SECONDS:-10}
  LIGHTHOUSE_COMMAND: ${LIGHTHOUSE_COMMAND:-lighthouse}
  LIGHTHOUSE_TIMEOUT_SECONDS: ${LIGHTHOUSE_TIMEOUT_SECONDS:-180}
  ARTIFACT_STORAGE_BACKEND: ${ARTIFACT_STORAGE_BACKEND:-local}
  ARTIFACT_LOCAL_ROOT: ${ARTIFACT_LOCAL_ROOT:-/data/aim/artifacts}
  SCAN_SCHEDULER_INTERVAL_SECONDS: ${SCAN_SCHEDULER_INTERVAL_SECONDS:-60}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
  SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
  SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
  ALERT_DELIVERY_BATCH_SIZE: ${ALERT_DELIVERY_BATCH_SIZE:-25}
  ALERT_WEBHOOK_TIMEOUT_SECONDS: ${ALERT_WEBHOOK_TIMEOUT_SECONDS:-10}
  WEB_BASE_URL: ${WEB_BASE_URL:-}
  SCENARIO_SECRETS_FILE: ${SCENARIO_SECRETS_FILE:-/run/aim/scenario-secrets/secrets.env}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  AI_REPORT_MODEL: ${AI_REPORT_MODEL:-claude-opus-4-8}
  AI_REPORT_LLM_TIMEOUT_SECONDS: ${AI_REPORT_LLM_TIMEOUT_SECONDS:-30}
  AI_REPORT_LLM_MAX_RETRIES: ${AI_REPORT_LLM_MAX_RETRIES:-1}
  AI_REPORT_LLM_MAX_TOKENS: ${AI_REPORT_LLM_MAX_TOKENS:-16000}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-aim}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
  MINIO_BUCKET: ${MINIO_BUCKET:-aim-artifacts}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *aim-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *aim-logging
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: aim-api
    restart: unless-stopped
    logging: *aim-logging
    environment: *aim-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - artifacts-data:/data/aim/artifacts

  migrate:
    # Reuses the api image so migrations always match the deployed api code;
    # a separately built migrate image can silently run stale migrations.
    image: aim-api
    profiles:
      - tools
    environment: *aim-env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "-c", "migrations/alembic.ini", "upgrade", "head"]

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    logging: *aim-logging
    environment: *aim-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "aim_worker.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
        # 동시성 2 필수: 조사 에이전트의 재검사 폴링이 슬롯 하나를 점유한 채
        # 재검사 태스크를 기다린다 — 1이면 자기 자신을 기다리는 교착이 된다.
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-2}",
      ]
    volumes:
      - artifacts-data:/data/aim/artifacts
      # 시나리오 {{secret:NAME}} 참조용 secrets.env(NAME=VALUE)가 들어 있는 디렉토리.
      # 파일이 아니라 디렉토리를 마운트해야 sed -i처럼 inode가 바뀌는 편집도
      # 컨테이너에 반영된다.
      - ${SCENARIO_SECRETS_HOST_DIR:-~/.config/aim/scenario-secrets}:/run/aim/scenario-secrets:ro

  beat:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    logging: *aim-logging
    environment: *aim-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "aim_worker.celery_app.celery_app", "beat", "--loglevel=INFO"]
    volumes:
      - artifacts-data:/data/aim/artifacts

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    logging: *aim-logging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *aim-logging
    environment:
      AIM_WEB_HOSTNAME: ${AIM_WEB_HOSTNAME:?set AIM_WEB_HOSTNAME}
      AIM_API_HOSTNAME: ${AIM_API_HOSTNAME:?set AIM_API_HOSTNAME}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  redis-data:
  artifacts-data:
  caddy-data:
  caddy-config:
